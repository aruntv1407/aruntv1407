<svg xmlns="http://www.w3.org/2000/svg" width="500" height="100">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .neon {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 42px;
        font-weight: 800;
        fill: #ffffff;
        text-anchor: middle;
        dominant-baseline: middle;
        letter-spacing: 2px;
        animation: pulse 2s infinite alternate;
      }
      @keyframes pulse {
        0% { filter: drop-shadow(0 0 5px #00d9ff) drop-shadow(0 0 15px #00d9ff); }
        50% { filter: drop-shadow(0 0 10px #00d9ff) drop-shadow(0 0 30px #00d9ff); }
        100% { filter: drop-shadow(0 0 5px #00d9ff) drop-shadow(0 0 15px #00d9ff); }
      }
    </style>
  </defs>
  <text x="50%" y="50%" class="neon" filter="url(#glow)">Web Designer</text>
</svg>